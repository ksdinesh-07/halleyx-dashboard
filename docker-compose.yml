version: '3.8'

services:

  backend:
    build: ./backend
    container_name: halleyx-backend
    restart: unless-stopped
    ports:
      - "5005:5005"
    volumes:
      - sqlite_data:/app/data
    environment:
      - PORT=5005
      - NODE_ENV=production

  frontend:
    build: ./frontend
    container_name: halleyx-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  sqlite_data:
    driver: local
